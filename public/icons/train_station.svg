<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pole -->
  <rect x="22" y="26" width="4" height="22" fill="#8B4513"/>
  <!-- Sign board - dark navy -->
  <rect x="9" y="4" width="30" height="22" rx="3" fill="#1a1a2e" stroke="#000" stroke-width="2"/>
  <!-- Red KTX stripe at top -->
  <rect x="11" y="7" width="26" height="4" rx="1" fill="#E60012"/>
  <!-- Rail tracks (white parallel lines) -->
  <rect x="11" y="14" width="26" height="2.5" rx="1" fill="white"/>
  <rect x="11" y="19" width="26" height="2.5" rx="1" fill="white"/>
  <!-- Cross ties -->
  <rect x="15" y="14" width="2" height="7.5" fill="#555"/>
  <rect x="22" y="14" width="2" height="7.5" fill="#555"/>
  <rect x="29" y="14" width="2" height="7.5" fill="#555"/>
</svg>
